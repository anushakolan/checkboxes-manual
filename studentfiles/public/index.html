<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Thousand Checkboxes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header style="text-align: center; margin-bottom: 10px;">
        <div id="connection-status" class="status-indicator status-connected">Connected</div>
    </header>
    <div id="sr-announcer" class="sr-only" aria-live="polite"></div>
    <main>
        <div id="checkbox-grid" class="checkbox-grid" role="group" aria-label="1000 Checkboxes">
            <!-- Checkboxes will be injected here by app.js -->
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
